<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ocean View Resort — Billing</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="dashPage" class="page active">
  <!-- Sidebar -->
  <div class="sidebar">
    <div style="padding:28px 24px 20px;">
      <p style="color:var(--gold);font-size:11px;letter-spacing:.14em;text-transform:uppercase;">Ocean View</p>
      <h2 style="color:white;font-size:20px;font-weight:300;font-family:'Cormorant Garamond',serif;">Resort System</h2>
    </div>
    <div style="border-top:1px solid rgba(255,255,255,0.08);margin:0 16px 16px;"></div>

    <a class="sidebar-item" href="overview.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Overview
    </a>
    <a class="sidebar-item" href="reservations.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Reservations
    </a>
    <a class="sidebar-item" href="newReservation.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      New Reservation
    </a>
    <a class="sidebar-item active" href="billing.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></svg>
      Billing
    </a>
    <a class="sidebar-item" href="help.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Help
    </a>

    <div style="position:absolute;bottom:0;left:0;right:0;padding:20px 24px;border-top:1px solid rgba(255,255,255,0.08);">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div style="width:36px;height:36px;background:rgba(201,168,76,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div>
          <p id="sidebarName" style="color:white;font-size:13px;font-weight:500;"></p>
          <p id="sidebarRole" style="color:var(--mist);font-size:11px;text-transform:uppercase;letter-spacing:.08em;"></p>
        </div>
      </div>
      <button onclick="doLogout()" style="width:100%;background:rgba(255,255,255,0.08);color:var(--mist);border:none;border-radius:8px;padding:9px;font-size:13px;cursor:pointer;transition:background .2s;" onmouseover="this.style.background='rgba(255,255,255,0.14)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
        Sign Out
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main" style="padding:36px;">
    <div id="section-billing" class="fade-in">
      <div style="margin-bottom:28px;">
        <h2 style="font-size:32px;font-weight:300;">Billing</h2>
        <p style="color:#7a9aaa;font-size:13px;margin-top:2px;">Calculate and print guest bills</p>
      </div>

      <div class="card" style="padding:32px;max-width:500px;margin-bottom:28px;">
        <h3 style="font-size:18px;font-weight:400;margin-bottom:20px;">Find Reservation</h3>
        <div style="display:flex;gap:12px;">
          <input class="inp" id="billSearch" placeholder="Enter Reservation Number (e.g. R-00001)" />
          <button class="btn-primary" style="white-space:nowrap;" onclick="findBill()">Find</button>
        </div>
        <div id="billError" class="alert alert-error" style="display:none;margin-top:14px;"></div>
      </div>

      <div id="billResult" style="display:none;" class="fade-in">
        <div class="card" style="padding:36px;max-width:520px;">
          <!-- Bill Header -->
          <div style="text-align:center;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--sand);">
            <h2 style="font-size:28px;font-weight:300;color:var(--ocean);">Ocean View Resort</h2>
            <p style="font-size:13px;color:#aaa;margin-top:2px;">Galle, Sri Lanka &nbsp;|&nbsp; Tel: +94 91 234 5678</p>
            <div style="margin-top:16px;background:var(--sand);border-radius:8px;padding:8px 16px;display:inline-block;">
              <span style="font-size:13px;font-weight:600;color:var(--ocean);" id="bill-resNo"></span>
            </div>
          </div>

          <div id="billGuestInfo" style="margin-bottom:20px;"></div>

          <div style="border-top:1px solid #eef2f4;margin-bottom:16px;"></div>
          <p style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-bottom:10px;">Charges</p>

          <div id="billCharges"></div>

          <div style="border-top:2px solid var(--ocean);margin-top:8px;padding-top:8px;" id="billTotalRow"></div>

          <div style="display:flex;gap:12px;margin-top:28px;">
            <button class="btn-gold" onclick="printBill()">Print Bill</button>
            <button class="btn-outline" onclick="markPaid()">Mark as Paid</button>
          </div>
        </div>
      </div>
    </div>
  </div><!-- /main -->
</div><!-- /dashPage -->

<script src="script.js"></script>
</body>
</html>
