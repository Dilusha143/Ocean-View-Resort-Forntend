<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ocean View Resort — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="loginPage" class="page active" style="min-height:100vh;">
  <div class="wave-bg" style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center; position:relative; z-index:1; padding-bottom:80px;">
      <!-- Logo -->
      <div style="margin-bottom:32px;">
        <div style="width:70px;height:70px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:2px solid rgba(201,168,76,0.6);">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <h1 style="color:white;font-size:38px;font-weight:300;letter-spacing:.02em;">Ocean View Resort</h1>
        <p style="color:var(--mist);font-size:14px;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;">Galle, Sri Lanka</p>
      </div>

    
      <div class="card" style="width:380px;padding:40px;text-align:left;">
        <h2 style="font-size:26px;font-weight:400;margin-bottom:6px;color:var(--deep);">Staff Login</h2>
        <p style="color:#7a9aaa;font-size:13px;margin-bottom:28px;">Enter your credentials to access the system</p>

        <div id="loginError" class="alert alert-error" style="display:none;"></div>

        <div style="margin-bottom:18px;">
          <label class="inp-label">Username</label>
          <input id="loginUser" class="inp" type="text" placeholder="e.g. admin" />
        </div>
        <div style="margin-bottom:28px;">
          <label class="inp-label">Password</label>
          <input id="loginPass" class="inp" type="password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" style="width:100%;" onclick="doLogin()">Sign In</button>

        <p style="text-align:center;font-size:12px;color:#aaa;margin-top:20px;">
          Demo: <b>admin</b> / <b>admin123</b> &nbsp;|&nbsp; <b>receptionist</b> / <b>recept123</b>
        </p>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
