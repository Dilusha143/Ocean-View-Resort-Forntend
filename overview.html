<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ocean View Resort — Overview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="dashPage" class="page active">
  <div class="sidebar">
    <div style="padding:28px 24px 20px;">
      <p style="color:var(--gold);font-size:11px;letter-spacing:.14em;text-transform:uppercase;">Ocean View</p>
      <h2 style="color:white;font-size:20px;font-weight:300;font-family:'Cormorant Garamond',serif;">Resort System</h2>
    </div>
    <div style="border-top:1px solid rgba(255,255,255,0.08);margin:0 16px 16px;"></div>

    <a class="sidebar-item active" href="overview.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Overview
    </a>
    <a class="sidebar-item" href="reservations.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Reservations
    </a>
    <a class="sidebar-item" href="newReservation.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      New Reservation
    </a>
    <a class="sidebar-item" href="billing.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></svg>
      Billing
    </a>
    <a class="sidebar-item" href="help.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Help
    </a>

    <div style="position:absolute;bottom:0;left:0;right:0;padding:20px 24px;border-top:1px solid rgba(255,255,255,0.08);">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div style="width:36px;height:36px;background:rgba(201,168,76,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div>
          <p id="sidebarName" style="color:white;font-size:13px;font-weight:500;"></p>
          <p id="sidebarRole" style="color:var(--mist);font-size:11px;text-transform:uppercase;letter-spacing:.08em;"></p>
        </div>
      </div>
      <button onclick="doLogout()" style="width:100%;background:rgba(255,255,255,0.08);color:var(--mist);border:none;border-radius:8px;padding:9px;font-size:13px;cursor:pointer;transition:background .2s;" onmouseover="this.style.background='rgba(255,255,255,0.14)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
        Sign Out
      </button>
    </div>
  </div>

  
  <div class="main" style="padding:36px;">

   
    <div id="section-overview" class="fade-in">
      <div style="margin-bottom:32px;">
        <h2 style="font-size:34px;font-weight:300;">Good morning, <span id="greetName" style="color:var(--ocean);font-style:italic;"></span></h2>
        <p style="color:#7a9aaa;font-size:14px;margin-top:4px;" id="todayDate"></p>
      </div>


      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px;">
        <div class="stat-card">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-label">Total Reservations</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:#2d6a2d;" id="stat-confirmed">0</div>
          <div class="stat-label">Confirmed</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:#1a5276;" id="stat-checkedin">0</div>
          <div class="stat-label">Checked In</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--gold);" id="stat-revenue">0</div>
          <div class="stat-label">Est. Revenue (LKR)</div>
        </div>
      </div>

    
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="padding:22px 24px;border-bottom:1px solid #eef2f4;display:flex;justify-content:space-between;align-items:center;">
          <h3 style="font-size:20px;font-weight:400;">Recent Reservations</h3>
          <button class="btn-outline" style="font-size:12px;padding:8px 16px;" onclick="location.href='reservations.html'">View All</button>
        </div>
        <table class="res-table">
          <thead><tr><th>Res. No.</th><th>Guest</th><th>Room Type</th><th>Check-In</th><th>Check-Out</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="recentTableBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>


<div id="viewModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <h3 style="font-size:24px;font-weight:400;">Reservation Details</h3>
      <button onclick="closeModal('viewModal')" style="background:none;border:none;font-size:24px;cursor:pointer;color:#aaa;line-height:1;">&times;</button>
    </div>
    <div id="viewModalContent"></div>
    <div style="display:flex;gap:10px;margin-top:24px;">
      <button class="btn-outline" onclick="closeModal('viewModal')">Close</button>
    </div>
  </div>
</div>
<div id="successModal" class="modal-overlay" style="display:none;">
  <div class="modal-box" style="text-align:center;max-width:420px;">
    <div style="width:64px;height:64px;background:#e6f4ea;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1e7e34" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h3 style="font-size:22px;font-weight:400;margin-bottom:8px;">Reservation Confirmed!</h3>
    <p id="successMsg" style="color:#7a9aaa;font-size:14px;margin-bottom:24px;"></p>
    <button class="btn-primary" onclick="closeModal('successModal');location.href='reservations.html'">View Reservations</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
